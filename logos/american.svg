<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <rect width="260" height="60" fill="white"/>
  <!-- AA eagle / flight path icon -->
  <g transform="translate(6,8)">
    <!-- Stylized A shape / flight arc -->
    <path d="M4,44 L22,4 L40,44" fill="none" stroke="#CC0000" stroke-width="5" stroke-linejoin="round"/>
    <line x1="10" y1="30" x2="34" y2="30" stroke="#CC0000" stroke-width="5"/>
    <!-- Wing sweep -->
    <path d="M22,4 Q36,14 46,10 Q38,20 22,20 Z" fill="#00205B"/>
  </g>
  <!-- American Airlines text -->
  <text x="58" y="28" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#00205B">AMERICAN</text>
  <text x="58" y="46" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#CC0000">Airlines</text>
</svg>
