<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <rect width="200" height="60" fill="white"/>
  <!-- Delta triangle logo (widget) -->
  <g transform="translate(8,10)">
    <!-- Red triangle pointing right -->
    <polygon points="0,40 24,0 48,40" fill="#CC0032"/>
    <!-- White triangle cutout (inner) -->
    <polygon points="8,36 24,8 40,36" fill="white"/>
    <!-- Small red inner triangle -->
    <polygon points="16,36 24,22 32,36" fill="#CC0032"/>
  </g>
  <!-- Delta wordmark -->
  <text x="70" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="26" fill="#003366">delta</text>
</svg>
