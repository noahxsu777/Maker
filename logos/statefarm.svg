<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <rect width="220" height="60" fill="white"/>
  <!-- Three interlocking ovals (State Farm symbol) -->
  <g transform="translate(8,8)">
    <!-- Top oval -->
    <ellipse cx="22" cy="14" rx="18" ry="10" fill="none" stroke="#CC0000" stroke-width="4"/>
    <!-- Bottom-left oval -->
    <ellipse cx="13" cy="30" rx="18" ry="10" fill="none" stroke="#CC0000" stroke-width="4" transform="rotate(-30,13,30)"/>
    <!-- Bottom-right oval -->
    <ellipse cx="31" cy="30" rx="18" ry="10" fill="none" stroke="#CC0000" stroke-width="4" transform="rotate(30,31,30)"/>
  </g>
  <!-- State Farm text -->
  <text x="62" y="28" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#CC0000">STATE FARM</text>
  <text x="62" y="46" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#444">Insurance</text>
</svg>
